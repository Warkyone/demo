<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <title>MonsterInn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* 游戏容器：横屏时铺满屏幕，保持16:9比例 */
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Canvas 铺满容器，保持比例不变形 */
        #GameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* 竖屏提示：默认隐藏，竖屏时显示 */
        #rotateTip {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.9);
            color: #fff;
            font-size: 24px;
            text-align: center;
            padding-top: 40vh;
            box-sizing: border-box;
            z-index: 9999;
        }

        /* 竖屏：显示提示，隐藏游戏 */
        @media (orientation: portrait) {
            #rotateTip { display: block; }
            #gameContainer { display: none; }
        }
        /* 横屏：显示游戏，隐藏提示 */
        @media (orientation: landscape) {
            #rotateTip { display: none; }
            #gameContainer { display: flex; }
        }
    </style>
</head>
<body>
    <div id="rotateTip">请将手机旋转至横屏，获得最佳游戏体验</div>
    <div id="gameContainer">
        <canvas id="GameCanvas"></canvas>
    </div>

    <script src="src/settings.js"></script>
    <script src="src/cocos2d-js.js"></script>
    <script src="src/main.js"></script>
    <script>
        // 尝试锁定横屏（兼容大部分浏览器）
        if (screen.orientation?.lock) {
            screen.orientation.lock('landscape').catch(err => {
                console.log('横屏锁定失败（部分浏览器不支持）:', err);
            });
        }
        // 窗口变化时，让Cocos自动重新适配
        window.addEventListener('resize', () => {
            if (window.cc?.view) {
                window.cc.view.resizeWithBrowserSize(true);
            }
        });
    </script>
</body>
</html>
