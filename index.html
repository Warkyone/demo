<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 核心：禁止缩放+强制适配横屏 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <title>MonsterInn</title>
    <style>
        /* 强制游戏容器保持16:9横屏比例，不被拉伸 */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #gameContainer {
            aspect-ratio: 16 / 9; /* 适配你的1280x720分辨率 */
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }
        /* 竖屏时显示提示，隐藏游戏避免变形 */
        #rotateTip {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 24px;
            text-align: center;
            padding-top: 50vh;
            box-sizing: border-box;
            z-index: 9999;
        }
        @media (orientation: portrait) {
            #rotateTip { display: block; }
            #gameContainer { display: none; }
        }
    </style>
</head>
<body>
    <!-- 竖屏提示 -->
    <div id="rotateTip">请将手机旋转至横屏，获得最佳游戏体验</div>
    <!-- 游戏容器 -->
    <div id="gameContainer">
        <canvas id="GameCanvas" width="1280" height="720"></canvas>
    </div>

    <script src="src/settings.js"></script>
    <script src="src/cocos2d-js.js"></script>
    <script src="src/main.js"></script>
    <script>
        // 尝试强制锁定横屏（部分浏览器支持）
        if (screen.orientation?.lock) {
            screen.orientation.lock('landscape').catch(() => {
                console.log('浏览器不支持强制横屏，已显示提示');
            });
        }
    </script>
</body>
</html>
